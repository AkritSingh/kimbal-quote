<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Works - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-container {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, padding 0.3s ease-out, margin 0.3s ease-out;
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin-top: 0;
            overflow: hidden;
        }
        
        .category-container.expanded {
            max-height: 5000px;
            opacity: 1;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            margin-top: 0.75rem;
        }
        
        .chevron-transition {
            transition: transform 0.25s ease;
        }
        
        .chevron-expanded {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-3 sm:py-4 md:py-6 px-3 sm:px-4 md:px-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-sm p-4 sm:p-5 md:p-6 mb-4 sm:mb-5 md:mb-6 border border-gray-200">
            <div class="flex items-start gap-2 sm:gap-3 mb-3 sm:mb-4">
                <div class="w-0.5 sm:w-1 h-8 sm:h-10 bg-gradient-to-b from-indigo-500 to-purple-600 rounded-full flex-shrink-0 mt-1"></div>
                <div class="min-w-0 flex-1">
                    <div class="flex items-center justify-between mb-1">
                        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 leading-tight">My Works</h1>
                        <a href="index.html" class="flex items-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-indigo-600 hover:text-indigo-700 hover:bg-indigo-50 rounded-lg transition-colors border border-indigo-200 hover:border-indigo-300">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                            </svg>
                            <span class="hidden sm:inline">Back to Tasks</span>
                            <span class="sm:hidden">Back</span>
                        </a>
                    </div>
                    <p class="text-xs sm:text-sm text-gray-600 mb-3">Portfolio of projects and microsites</p>
                    <!-- Contact Details -->
                    <div class="flex flex-wrap items-center gap-3 sm:gap-4 pt-3 border-t border-gray-200">
                        <div class="flex items-center gap-2 text-xs sm:text-sm text-gray-700">
                            <svg class="w-4 h-4 text-indigo-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span class="font-medium">Akrit Singha</span>
                        </div>
                        <a href="mailto:akritsingha.official@gmail.com" class="flex items-center gap-2 text-xs sm:text-sm text-indigo-600 hover:text-indigo-700 transition-colors">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                            <span>akritsingha.official@gmail.com</span>
                        </a>
                        <a href="tel:6295570331" class="flex items-center gap-2 text-xs sm:text-sm text-indigo-600 hover:text-indigo-700 transition-colors">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                            </svg>
                            <span>+91 6295570331</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Works Container -->
        <div id="worksContainer" class="space-y-3 sm:space-y-4"></div>
    </div>

    <script src="myworks.js"></script>
    <script>
        // Render category
        function renderCategory(categoryData, index) {
            const categoryId = `category-${index}`;
            const hasWorks = categoryData.works && categoryData.works.length > 0;
            
            let html = `
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-3 sm:p-4 cursor-pointer category-header hover:bg-gray-50 transition-colors" data-category-id="${categoryId}">
                        <div class="flex items-center justify-between gap-3">
                            <div class="flex items-center gap-2.5 sm:gap-3 flex-1 min-w-0">
                                <button class="expand-btn flex-shrink-0 w-6 h-6 sm:w-7 sm:h-7 flex items-center justify-center rounded hover:bg-indigo-50 transition-colors group" data-category-id="${categoryId}">
                                    <svg class="chevron-transition w-4 h-4 sm:w-5 sm:h-5 text-gray-600 group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
                                    </svg>
                                </button>
                                <div class="flex-1 min-w-0">
                                    <h2 class="text-base sm:text-lg font-bold text-gray-900 leading-tight">${categoryData.category}</h2>
                                    <p class="text-xs sm:text-sm text-gray-600 mt-0.5 leading-snug">${categoryData.description}</p>
                                </div>
                            </div>
                            <div class="flex-shrink-0">
                                <span class="inline-flex items-center justify-center px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-lg bg-indigo-50 text-indigo-700 border border-indigo-200 text-xs font-semibold">
                                    ${hasWorks ? categoryData.works.length : 0} ${hasWorks && categoryData.works.length === 1 ? 'Project' : 'Projects'}
                                </span>
                            </div>
                        </div>
                    </div>
                    ${hasWorks ? `
                        <div class="category-container border-t border-gray-200" data-category-id="${categoryId}">
                            <div class="p-3 sm:p-4 space-y-2 sm:space-y-3">
                                ${categoryData.works.map(work => renderWork(work)).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            return html;
        }

        // Render individual work item
        function renderWork(work) {
            return `
                <a href="${work.url}" target="_blank" rel="noopener noreferrer" class="block p-3 sm:p-4 bg-gray-50 hover:bg-indigo-50 rounded-lg border border-gray-200 hover:border-indigo-300 transition-all duration-200 group">
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-2.5 sm:gap-3 flex-1 min-w-0">
                            <div class="flex-shrink-0 w-8 h-8 sm:w-10 sm:h-10 rounded-lg bg-indigo-100 group-hover:bg-indigo-200 flex items-center justify-center transition-colors">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
                                </svg>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="text-sm sm:text-base font-semibold text-gray-900 group-hover:text-indigo-700 transition-colors leading-tight">${work.title}</h3>
                                <p class="text-xs text-gray-500 mt-0.5 truncate">${work.url}</p>
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            <svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                            </svg>
                        </div>
                    </div>
                </a>
            `;
        }

        // Initialize the app
        function init() {
            const container = document.getElementById('worksContainer');
            
            if (!myWorks || myWorks.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow-sm p-8 text-center border border-gray-200">
                        <p class="text-gray-600">No works to display.</p>
                    </div>
                `;
                return;
            }
            
            // Render all categories
            myWorks.forEach((category, index) => {
                container.innerHTML += renderCategory(category, index);
            });

            // Add expand/collapse functionality
            document.querySelectorAll('.expand-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const categoryId = btn.getAttribute('data-category-id');
                    const container = document.querySelector(`.category-container[data-category-id="${categoryId}"]`);
                    const chevron = btn.querySelector('svg');
                    
                    if (container) {
                        const isExpanded = container.classList.contains('expanded');
                        
                        if (isExpanded) {
                            // Collapse
                            container.classList.remove('expanded');
                            chevron.classList.remove('chevron-expanded');
                        } else {
                            // Expand
                            container.classList.add('expanded');
                            chevron.classList.add('chevron-expanded');
                        }
                    }
                });
            });

            // Make entire category header clickable for expand/collapse
            document.querySelectorAll('.category-header').forEach(header => {
                const categoryId = header.getAttribute('data-category-id');
                const expandBtn = document.querySelector(`.expand-btn[data-category-id="${categoryId}"]`);
                if (expandBtn) {
                    header.addEventListener('click', () => {
                        expandBtn.click();
                    });
                }
            });
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
