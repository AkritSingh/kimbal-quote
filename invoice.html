<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - Kimbal Project Tasks & Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-3 sm:py-4 md:py-6 px-3 sm:px-4 md:px-6">
    <div class="max-w-4xl mx-auto" id="invoiceContent">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-sm p-4 sm:p-5 md:p-6 mb-4 sm:mb-5 md:mb-6 border border-gray-200">
            <div class="flex items-start gap-2 sm:gap-3 mb-3 sm:mb-4">
                <div class="w-0.5 sm:w-1 h-8 sm:h-10 bg-gradient-to-b from-indigo-500 to-purple-600 rounded-full flex-shrink-0 mt-1"></div>
                <div class="min-w-0 flex-1">
                    <div class="flex items-center justify-between mb-1">
                        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 leading-tight">Invoice <span id="invoiceTitleSmall"></span></h1>
                        <div class="flex items-center gap-2 sm:gap-3 no-print">
                            <a href="payments.html" class="flex items-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-indigo-600 hover:text-indigo-700 hover:bg-indigo-50 rounded-lg transition-colors border border-indigo-200 hover:border-indigo-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                                </svg>
                                <span class="hidden sm:inline">Back to Payments</span>
                                <span class="sm:hidden">Payments</span>
                            </a>
                            <button id="downloadPdf" class="flex items-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-green-600 hover:text-green-700 hover:bg-green-50 rounded-lg transition-colors border border-green-200 hover:border-green-300 no-print">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                                <span class="hidden sm:inline">Download PDF</span>
                                <span class="sm:hidden">PDF</span>
                            </button>
                        </div>
                    </div>
                    <p class="text-xs sm:text-sm text-gray-600">Detailed breakdown of project invoice.</p>
                    <!-- Developer Contact Details -->
                    <div class="flex flex-wrap items-center gap-3 sm:gap-4 pt-3 border-t border-gray-200 mt-3">
                        <div class="flex items-center gap-2 text-xs sm:text-sm text-gray-700">
                            <svg class="w-4 h-4 text-indigo-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <span id="developerName" class="font-medium"></span>
                        </div>
                        <a id="developerEmailLink" href="#" class="flex items-center gap-2 text-xs sm:text-sm text-indigo-600 hover:text-indigo-700 transition-colors">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            <span id="developerEmail"></span>
                        </a>
                        <a id="developerPhoneLink" href="#" class="flex items-center gap-2 text-xs sm:text-sm text-indigo-600 hover:text-indigo-700 transition-colors">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                            <span id="developerPhone"></span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Invoice Details -->
        <div id="invoiceDetails" class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 sm:p-5 md:p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 pb-6 border-b border-gray-200">
                <div>
                    <p class="text-xs text-gray-500">Invoice For:</p>
                    <p id="clientName" class="text-sm font-semibold text-gray-900"></p>
                </div>
                <div class="md:text-right">
                    <p class="text-xs text-gray-500">Invoice Date:</p>
                    <p id="invoiceDate" class="text-sm font-semibold text-gray-900"></p>
                    <p class="text-xs text-gray-500 mt-2">Invoice Number:</p>
                    <p id="invoiceNumber" class="text-sm font-semibold text-gray-900"></p>
                </div>
            </div>

            <div class="mb-6">
                <h3 class="text-lg sm:text-xl font-bold text-gray-900 mb-4" id="invoiceMainTitle"></h3>
                <p class="text-sm text-gray-700" id="invoiceDescription"></p>
            </div>

            <div class="overflow-x-auto mb-6">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Task</th>
                            <th scope="col" class="px-4 py-2 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="tasksTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Tasks will be injected here -->
                    </tbody>
                    <tfoot>
                        <tr class="bg-gray-50">
                            <td class="px-4 py-2 text-right text-base font-medium text-gray-900">Total:</td>
                            <td class="px-4 py-2 text-right text-base font-bold text-indigo-700" id="totalAmount"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-200">
                <p class="text-xs text-gray-500">Payment Status:</p>
                <p id="paymentStatus" class="text-sm font-semibold text-gray-900"></p>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mt-6 text-sm">
            Unable to load invoice details or invoice not found. Please ensure the link is correct or contact me for assistance.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const invoiceId = urlParams.get('invoiceId');
            const invoiceContent = document.getElementById('invoiceContent');
            const errorState = document.getElementById('errorState');

            const formatPrice = (price) => {
                return new Intl.NumberFormat('en-IN', {
                    style: 'currency',
                    currency: 'INR',
                    maximumFractionDigits: 0
                }).format(price);
            };

            if (!invoiceId) {
                invoiceContent.classList.add('hidden');
                errorState.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('payments.json');
                if (!response.ok) {
                    throw new Error('Failed to fetch payments data');
                }
                const data = await response.json();

                const invoice = data.invoices.find(inv => inv.id === invoiceId);

                if (!invoice || !invoice.active || invoice.status.toLowerCase() === 'not generated') {
                    invoiceContent.classList.add('hidden');
                    errorState.classList.remove('hidden');
                    return;
                }

                // Populate invoice details
                document.getElementById('invoiceTitleSmall').textContent = `(#${invoice.id})`;
                document.getElementById('invoiceMainTitle').textContent = invoice.title;
                document.getElementById('invoiceDescription').textContent = invoice.description || '';
                document.getElementById('invoiceDate').textContent = invoice.date || 'N/A';
                document.getElementById('invoiceNumber').textContent = invoice.id;
                
                // Prioritize invoice-specific clientName, then fallback to global clientName
                document.getElementById('clientName').textContent = invoice.clientName || data.clientName || 'N/A';

                // Populate developer contact details
                document.getElementById('developerName').textContent = invoice.developerName || data.developerName || 'N/A';
                document.getElementById('developerEmail').textContent = invoice.developerEmail || data.developerEmail || 'N/A';
                document.getElementById('developerEmailLink').href = `mailto:${invoice.developerEmail || data.developerEmail || ''}`;
                document.getElementById('developerPhone').textContent = invoice.developerPhone || data.developerPhone || 'N/A';
                document.getElementById('developerPhoneLink').href = `tel:${invoice.developerPhone || data.developerPhone || ''}`;


                let totalAmountCalculated = 0;
                if (invoice.tasks && invoice.tasks.length > 0) {
                    totalAmountCalculated = invoice.tasks.reduce((sum, task) => sum + (task.amount || 0), 0);
                    tasksTableBody.innerHTML = invoice.tasks.map(task => `
                        <tr>
                            <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-800">${task.title}</td>
                            <td class="px-4 py-2 whitespace-nowrap text-right text-sm text-gray-800">${formatPrice(task.amount || 0)}</td>
                        </tr>
                    `).join('');
                } else {
                    totalAmountCalculated = invoice.amount || 0;
                    tasksTableBody.innerHTML = `
                        <tr>
                            <td colspan="2" class="px-4 py-2 text-center text-sm text-gray-500">No tasks listed for this invoice.</td>
                        </tr>
                    `;
                }
                document.getElementById('totalAmount').textContent = formatPrice(totalAmountCalculated);

                const paymentStatusElement = document.getElementById('paymentStatus');
                if (invoice.status) {
                    paymentStatusElement.textContent = invoice.status.charAt(0).toUpperCase() + invoice.status.slice(1);
                    if (invoice.status.toLowerCase() === 'paid') {
                        paymentStatusElement.classList.add('text-green-600');
                    } else {
                        paymentStatusElement.classList.add('text-amber-600');
                    }
                } else {
                    paymentStatusElement.textContent = 'N/A';
                }

                // PDF Download functionality
                document.getElementById('downloadPdf').addEventListener('click', () => {
                    const element = document.getElementById('invoiceContent');
                    html2pdf().from(element).set({
                        margin: [10, 10, 10, 10],
                        filename: `invoice_${invoice.id}.pdf`,
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2 },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    }).save();
                });

            } catch (error) {
                console.error('Error loading invoice:', error);
                invoiceContent.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
