<!-- NO_REFRESH -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>beacon ads content template</title>
    <style>
      *,
      *::before,
      *::after {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        position: relative;
        background: #f0ea00;
      }

      .promotr_img {
        position: fixed;
        bottom: 70.1px;
        opacity: 1;
        border-radius: 50%;
        width: 100px;
        height: 100px;
        z-index: 1;
        background: #84937e;
        transition: opacity 0.7s 0.6s;
      }
      .promotr_img img{
        width: 107px;
        height: 107px;
        object-fit: contain;
        object-position: center;
        position: absolute;
        inset: -2px;
        margin: auto;
      }

      .inner_iframe {
        opacity: 0;
        z-index: -1;
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0;
        bottom: 0;
        right: 0;
        transition: opacity 0.3s ease-in 0.5s;
        border: 0;
        background: #583497;
      }

      .expanded .promotr_img {
        opacity: 0;
        transition: opacity 0.5s;
      }

      .expanded .inner_iframe {
        opacity: 1;
        z-index: 2;
      }

      .btn-close {
        margin: 0;
        border: 0;
        padding: 0;
        background: #000000;
        border-radius: 45% 0% 0% 45%;
        width: 70px;
        height: 50px;
        cursor: pointer;
        transition: 0.8s ease-in-out;
        position: absolute;
        top: 90px;
        right: 0px;
        z-index: 10000;
        box-shadow: -2px 2px 13px 2px rgb(49 1 1 / 48%);
      }
      .btn-close .icon-arrow {
        margin: 0;
        padding: 0;
        border: 0;
        background: 0 0;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 21px;
        height: 28px;
        display: none;
      }
      .squeeze{
        border-radius: 42px 0% 0% 42px !important;
        width: 40px !important;
      }

      .btn-close .icon-arrow:after,
      .btn-close .icon-arrow:before {
        content: "";
        position: absolute;
        top: 6px;
        left: 0;
        right: 0;
        height: 6px;
        background: #fff;
        border-radius: 6px;
      }

      .btn-close .icon-arrow:before {
        transform: rotate(45deg);
        margin-top: 12px;
      }

      .btn-close .icon-arrow:after {
        transform: rotate(-45deg);
      }

      .btn-close .icon-cross {
        margin: 0;
        padding: 0;
        border: 0;
        background: 0 0;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 28px;
        height: 28px;
      }

      .btn-close .icon-cross:after,
      .btn-close .icon-cross:before {
        content: "";
        position: absolute;
        top: 11px;
        left: 0;
        right: 0;
        height: 6px;
        background: #fff;
        border-radius: 6px;
      }

      .btn-close .icon-cross:before {
        transform: rotate(45deg);
      }

      .btn-close .icon-cross:after {
        transform: rotate(-45deg);
      }

      .btn-close .icon-cross span {
        display: block;
      }

      .visually-hidden {
        position: absolute;
        clip: rect(1px, 1px, 1px, 1px);
        padding: 0;
        border: 0;
        height: 1px;
        width: 1px;
        overflow: hidden;
      }


      .innerPromotrDiv {
        height: calc(100% - 100px);
        width: 100%;
        position: absolute;
        bottom: 0;
      }

      .beacon-loader {
        position: relative;
        width: 100%;
        height: 100%;
        background: #ffffff70;
        z-index: 10;
        display: none;
      }

      .beacon-loader:before {
        content: "";
        position: absolute;
        width: 40px;
        height: 40px;
        border: 0.25rem solid rgba(0, 0, 0, 0.8);
        border-top-color: hsla(0, 0%, 100%, 0.7);
        -webkit-animation: spin 1s infinite linear;
        animation: spin 1s infinite linear;
        top: 50%;
        left: 50%;
        margin-left: -20px;
        margin-top: -20px;
        z-index: 11;
        -webkit-border-radius: 50%;
        -moz-border-radius: 50%;
        border-radius: 50%;
        -webkit-background-clip: padding-box;
        -moz-background-clip: padding;
        background-clip: padding-box;
        z-index: 2;
      }
      .volume_btn{
        width: 30px;
        height: 30px;
        position: absolute;
        bottom: 10px;
        right: 10px;
        z-index: 1000;
        background: black;
        padding: 5px;
        border-radius: 3px;
      }
      /* fullscreen template start */
      .promoLogo{
        position: absolute;
        top: 20px;
        height: 70px;
        width: auto;
        left: 20px
      }

      .full-screen-template{
        height: 100%;
        width: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        margin: 0 auto;
        position: relative;
      }
      
      .imgContainer{
        position: absolute;
        inset: 0;
      }

      .imgContainer video{ 
        position: absolute;
        inset: 0;
        margin: auto;
        object-fit: contain;
      }
      /* fullscreen template end */

      @-webkit-keyframes spin {
        0% {
          -webkit-transform: rotate(0deg);
          transform: rotate(0deg);
        }

        100% {
          -webkit-transform: rotate(360deg);
          transform: rotate(360deg);
        }
      }

      @keyframes spin {
        0% {
          -webkit-transform: rotate(0deg);
          transform: rotate(0deg);
        }

        100% {
          -webkit-transform: rotate(360deg);
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="promotr_img"
    class="promotr_img">
    <img src="https://static.toiimg.com/photo/113850911.cms"/>
    <img src="https://static.toiimg.com/photo/113850913.cms"/>
    </div>
   
    <div class="innerPromotrDiv" id="innerPromotrDiv">
      <div class="beacon-loader" id="beacon_loader_icon"></div>
      <!-- <template> -->
        <div id="fullScreenTemplate" class="full-screen-template">
          <img src="https://static.toiimg.com/photo/113851146.cms"/>
          
          <div class="imgContainer" onclick="toggleSound()" id="videoContainer">
            <div class="volume_btn" id="volumeBtnWrapper"><img id="volumeBtn" src="https://static.toiimg.com/photo/110074236.cms"/></div>
          </div>
        </div>
      <!-- </template> -->
      
      <button type="button" class="btn-close" id="close_promotr_inner_btn">
        <span class="icon-arrow" id="expand_close_promotr"></span>
        <span class="icon-cross" id="close_promotr"></span>
      </button>
    </div>

    <script>
      var volumeStatus = 0;
      var videoContainer = document.getElementById('videoContainer');
      (function () {
        var windowWidth = window.top.innerWidth;
        var contentWidth = 0;
        if (windowWidth >= 1421){
          contentWidth = 1168
        }else{
          contentWidth = 1000 
        }
        if(windowWidth < 1000){
          var fromleft =  50;
        }else{
          var fromleft = (windowWidth - contentWidth) / 2 + 50;
        }
        

        /* All variables */
        var clipPathPos_X = fromleft,
          clipPathPos_Y = window.top.innerHeight - 70 + 50,
          maxClipPathRadius =
            (window.top.innerHeight ** 2 + window.top.innerWidth ** 2) **
            (1 / 2),
          parentIframe =
            window.frameElement ||
            window.parent.document.getElementById(window.name),
          parentBody = window.top.document.body,
          innerIframe = document.getElementById("inner_frame"),
          fullScreenTemplate = document.getElementById('fullScreenTemplate'),
          innerCloseButton = document.getElementById("close_promotr_inner_btn"),
          innerCloseArrow = document.getElementById("close_promotr"),
          innerExpandArrow = document.getElementById("expand_close_promotr"),
          promotrImg = document.getElementById("promotr_img"),
          loaderIcon = document.getElementById("beacon_loader_icon"),
          videoContainer = document.getElementById('videoContainer'),
          redirectUrlWeb = "https://promobell-in.app.link/promobell/?mobile=&category=10promo",
          parentURL = window.top.location.href.split('?')[0],
          videoPath = "./Greenply_web_beacon.mp4",
          videoSrc = '<video  preload="none" width="100%" autoPlay muted playsinline loop> <source src="'+videoPath+'" type="video/mp4" /><p>Your browser does not support the HTML5 Video element.</p></video><IFRAME SRC="https://ad.doubleclick.net/ddm/trackimpi/N453403.160430TOI/B32487060.401482675;dc_trk_aid=593603265;dc_trk_cid=220989153;ord=[timestamp];dc_lat=;dc_rdid=;tag_for_child_directed_treatment=;tfua=;gdpr=${GDPR};gdpr_consent=${GDPR_CONSENT_755};ltd=;dc_tdv=1?" WIDTH=1 HEIGHT=1 MARGINWIDTH=0 MARGINHEIGHT=0 HSPACE=0 VSPACE=0 FRAMEBORDER=0 SCROLLING=no BORDERCOLOR="#000000"></IFRAME>',
          business = 'toi';
        //   squeezeInnerCloseBtnTimeout;

        promotrImg.style.left = fromleft + 'px';
        /* adding css to the parent window */
        function addCssToTopWindow() {
          var promotrStyleSheet = document.createElement("style");
          promotrStyleSheet.type = "text/css";
          promotrStyleSheet.innerText =
            "div[id^='div-gpt-ad-']:empty iframe, div[id^='div-gpt-ad-']:first-child .sticky_iframe{margin: 0px !important; z-index: 9999999999999999;}  div[id^='div-gpt-ad-beacon-'] {z-index: 9999999999999999 !important;} @keyframes rippleEffectBeacon { from { opacity: 1; transform: scale(1);} to { opacity: 0; transform: scale(1.5);}}  .ripple_effect::before{ content: ''; height: 100px; width: 100px; position: fixed; bottom: 70px; z-index: 99999998; border-radius: 50%; border: 3px solid #2d921c; left:" +clipPathPos_X +"px; box-sizing: border-box; transition-duration: 0.5s; transition-timing-function: ease-in-out; animation: rippleEffectBeacon 1s ease-out infinite; -webkit-box-shadow: -3px -4px 12px 7px rgba(0,0,0,0.75); -moz-box-shadow: -3px -4px 12px 7px rgba(0,0,0,0.75); box-shadow: inset -3px -4px 12px 7px rgb(172 218 255);}   .promotr-shadow{height: 100px; width: 100px; position: fixed; bottom: 70px; z-index: 6; border-radius: 50%; left: " + (clipPathPos_X) +"px; -webkit-box-shadow: 0px 5px 17px 7px rgb(0 0 0 / 34%); -moz-box-shadow: 0px 5px 17px 7px rgb(0 0 0 / 34%); box-shadow: 0px 5px 17px 7px rgb(0 0 0 / 34%);}  .sticky_iframe{ background: #fff; position: fixed;  bottom: 0; right: 0; height: " +
            parseInt(window.top.outerHeight + 100) +
            "px;  width:" +
            window.top.innerWidth +
            "px;  z-index: 99999999999999999999;  display: block; border: none;  clip-path: circle(50px at " +
            (clipPathPos_X+50) +
            "px " +
            clipPathPos_Y +
            "px);  -webkit-clip-path: circle(50px at " +
            (clipPathPos_X+50) +
            "px " +
            clipPathPos_Y +
            "px);  box-shadow: -1px 4px 24px -1px rgba(0,0,0,0.75); }  .promotrTransitionCss{transition: all 0.8s ease-in-out; -webkit-transition: all 0.8s ease-in-out; -moz-transition: all 0.8s ease-in-out; -ms-transition: all 0.8s ease-in-out; -o-transition: all 0.8s ease-in-out; transition-property: -webkit-clip-path, clip-path; -webkit-transition-property: -webkit-clip-path, clip-path; -moz-ttransition-property: -webkit-clip-path, clip-path; -ms-transition-property: -webkit-clip-path, clip-path; -o-transition-property: -webkit-clip-path, clip-path;}  .expand_iframe {  clip-path: circle(" +
            maxClipPathRadius +
            "px at 50% 50%);} .remove_promotr_beacon_bubble_div{display: none !important} .lock_scroll { height: 100% !important; overflow: hidden !important; touch-action: none !important}  .btn-promotr-close {margin: 0; border: 0; padding: 0; border-radius: 50%; width: 18px; height: 18px; display: flex; flex-flow: column nowrap; justify-content: center; align-items: center; cursor: pointer; transition: all 150ms; position: fixed; z-index: 999999999; bottom: 145px; left: " + (clipPathPos_X + 100) +"px; top: auto; background: #000000b3;} .btn-promotr-close .icon-cross_1 { margin: 0; padding: 0; border: 0; background: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 25px;} .btn-promotr-close .icon-cross_1:before, .btn-promotr-close .icon-cross_1:after {content: '';position: absolute;top: 11px; left: 0; right: 0; height: 3px; background: #fff; border-radius: 6px;} .btn-promotr-close .icon-cross_1:before { transform: rotate(45deg);}.btn-promotr-close .icon-cross_1:after { transform: rotate(-45deg);} .btn-promotr-close .icon-cross_1 span { display: block;}.btn-close:hover, .btn-close:focus { background: #ae191e;} .visually-hidden { position: absolute; clip: rect(1px, 1px, 1px, 1px); padding: 0; border: 0; height: 1px; width: 1px; overflow: hidden;}";

          window.parent.document.head.appendChild(promotrStyleSheet);
        }   


        function addMetaToTopWindow(){
          var promotrMeta = document.createElement("meta");
          promotrMeta.name = "viewport";
          promotrMeta.content = "width=" + window.top.innerWidth + ", minimal-ui";
          window.top.document.head.appendChild(promotrMeta);
        }


        function createElementToTopWindow(){
          parentIframe.setAttribute("data-currentUrl", window.top.location.href.split("?")[0]);

          var outerCloseButton = document.createElement("button");
          var rippleDiv = document.createElement("div");
          var shadowDiv = document.createElement("div");

          parentIframe.parentElement.classList.add("sticky_promotr_div");
          parentIframe.classList.add("sticky_iframe");

          /* close botton for beacon ad */
          outerCloseButton.classList.add("btn-promotr-close");
          outerCloseButton.id = "close_promotr_btn";
          outerCloseButton.innerHTML = `<span class="icon-cross_1"></span><span class="visually-hidden">Close</span>`;

          /* for ripple effect  */          
          rippleDiv.classList.add("ripple_effect");

          /* for shadow effect */
          shadowDiv.classList.add("promotr-shadow");

          /* adding to parent window */
          parentIframe.parentElement.appendChild(outerCloseButton);
          parentIframe.parentElement.appendChild(rippleDiv);
          parentIframe.parentElement.appendChild(shadowDiv);
          
          /* close beacon ad - outer close*/
          window.top.document.getElementById("close_promotr_btn").addEventListener("click", function(){
            window.top.document.getElementById("close_promotr_btn").parentElement.remove();
          })
        }

        
        /* adding js to the parent window */
        function addJsToTopWindowForWindowHistoryHandler() {
          // this js for detect perpectual url change
          var promotrJs = document.createElement("script");
          promotrJs.type = "text/javascript";
          promotrJs.innerText =
            '/* locationchange handler from beacon */ (function () {var oldPushState = window.history.pushState; history.pushState = function pushState() { var ret = oldPushState.apply(this, arguments); window.dispatchEvent(new Event("pushstate")); window.dispatchEvent(new Event("locationchange")); return ret;}; oldReplaceState = history.replaceState; history.replaceState = function replaceState() { var ret = oldReplaceState.apply(this, arguments);  window.dispatchEvent(new Event("replacestate")); window.dispatchEvent(new Event("locationchange")); return ret;}; window.addEventListener("popstate", function () {window.dispatchEvent(new Event("locationchange"));});})();';

          if(window.top.windowLocationChangeEventHandler && window.top.windowLocationChangeEventHandler === true){
            console.log('windowLocationChangeEventHandler present - check from beacon');
          }else{
            window.parent.document.head.appendChild(promotrJs);
            console.log('windowLocationChangeEventHandler insertrd - from beacon');
            window.top.windowLocationChangeEventHandler = true;
          }
          
        } 
        
        function locationchangeEventHandler(){
          // on locationchange remove bubble
          window.top.addEventListener("locationchange", function (data) {
            if (
              parentIframe.getAttribute("data-currentUrl") !==
              window.top.location.href.split("?")[0] &&
              window.top.location.href.split("?")[0].indexOf("/spotlight/") !== -1
            ) {
              window.top.document.getElementById("close_promotr_btn").parentElement.classList.add("remove_promotr_beacon_bubble_div");
            } else {
              window.top.document.getElementById("close_promotr_btn").parentElement.classList.remove("remove_promotr_beacon_bubble_div");
            }
          });
        }

        /* function -> open and close beacon ad */
        var toggleAdView = function (open) {      
          if (open) {
            fullScreenTemplate.classList.add('active');
            innerPromotrDiv.style.height = `${window.top.innerHeight}px`;
            if (window.top.outerHeight - window.top.innerHeight < 70) {
              innerPromotrDiv.style.height = `${window.top.outerHeight}px`;
            }
            parentIframe.classList.add("expand_iframe");
            parentIframe.classList.add("promotrTransitionCss");
            parentBody.classList.add("lock_scroll");
            document.body.classList.add("expanded");

            if(!window.loadFullScreenAssets) {
              window.loadFullScreenAssets = true;
              videoContainer.innerHTML += videoSrc + '';
            }
            playPause(true);
          } else {
            fullScreenTemplate.classList.remove('active');
            parentIframe.classList.remove("expand_iframe");
            parentBody.classList.remove("lock_scroll");
            document.body.classList.remove("expanded");
            playPause(false);
          }
        };

        function playPause(e){
            if(e){
                videoContainer.children[1].play();
                if(volumeStatus == 1){videoContainer.children[1].muted = false}else{videoContainer.children[1].muted = true}
            }else{
                videoContainer.children[1].pause();
            }
        }
        // click events start

        // img on click
        promotrImg.addEventListener("click", function () {
          /* opening ad */
          toggleAdView(true);
          fullScreenTemplate.setAttribute("data-open", "1");
          squeezeInnerCloseBtn(true);
        });

        /* close beacon ad - inner close*/
        innerCloseArrow.addEventListener("click", function () {
          toggleAdView(false);
          loaderIcon.style.display = "none";
          squeezeInnerCloseBtn(false);
        });

        innerExpandArrow.addEventListener("click", function () {
            squeezeInnerCloseBtn(false);
            squeezeInnerCloseBtn(true);
        });

        function squeezeInnerCloseBtn(squeeze){
          // debugger;
            if(squeeze){
                squeezeInnerCloseBtnTimeout = setTimeout(function(){
                    if(fullScreenTemplate.getAttribute("data-open") === '1'){
                        innerCloseButton.classList.add('squeeze');
                        innerCloseArrow.style.display = "none";
                        innerExpandArrow.style.display = "block";
                    }
                }, 4000);
            }
            else{
                clearTimeout(squeezeInnerCloseBtnTimeout);
                innerCloseButton.classList.remove('squeeze');
                innerExpandArrow.style.display = "none";
                innerCloseArrow.style.display = "block";
            }
        }
        /* initiate Beacon  */
        function initBeacon() {
          addCssToTopWindow();
          addMetaToTopWindow();
          createElementToTopWindow();
          addJsToTopWindowForWindowHistoryHandler();
          locationchangeEventHandler();
        };

        initBeacon();
      })();

      function toggleSound(){
            document.getElementById("volumeBtn").src =  'https://static.toiimg.com/photo/' + (volumeStatus == "0" ? "110074234" : "110074236") + '.cms';
            volumeStatus = volumeStatus == 0 ? 1 : 0;
            if(volumeStatus == 1){videoContainer.children[1].muted = false}else{videoContainer.children[1].muted = true}
        }
    </script>
  </body>
</html>
